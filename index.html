<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaishStyle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #E91E63;
            --pink-dark: #C2185B;
            --bg: #E7E7E7;
            --white: #fff;
            --text: #1E1E1E;
            --muted: #777;
            --radius: 20px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* NAV */
        nav { display: flex; justify-content: center; padding: 14px 16px; }
        .nav-inner {
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 999px; height: 44px;
            display: flex; align-items: center; padding: 0 20px; gap: 8px;
        }
        .logo-icon {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--pink), var(--pink-dark));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 800; font-size: 14px;
        }
        .logo-text { font-size: 1rem; font-weight: 700; color: var(--text); }
        .logo-text span { color: var(--pink); }

        /* PRODUCT LAYOUT */
        #product-container {
            display: none;
            max-width: 860px;
            margin: 32px auto;
            padding: 0 24px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        /* IMAGE 9:16 */
        .prod-img-wrap {
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            width: 100%;
            aspect-ratio: 9 / 16;
            background: #ddd;
        }
        .prod-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* INFO */
        .prod-info { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 80px; }
        .prod-name { font-size: 1.5rem; font-weight: 700; line-height: 1.3; }

        /* RATING ROW */
        .prod-rating-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .stars-row { display: flex; gap: 2px; }
        .star.full { color: #f59e0b; }
        .star.half { color: #f59e0b; opacity: 0.6; }
        .star.empty { color: #ddd; }
        .rating-score { font-weight: 700; font-size: 0.95rem; }
        .rating-count { color: var(--muted); font-size: 0.85rem; }
        .sold-count { color: var(--muted); font-size: 0.85rem; }

        /* PRICE */
        .prod-prices { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .prod-price { font-size: 1.5rem; font-weight: 700; color: var(--pink); }
        .prod-old { font-size: 1rem; color: var(--muted); text-decoration: line-through; }

        /* SIZES */
        .sizes-label { font-size: 0.9rem; font-weight: 600; color: var(--text); }
        .sizes-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
        .size-tag {
            padding: 6px 14px;
            border: 1.5px solid #ddd;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            background: var(--white);
        }
        .size-tag:hover, .size-tag.active {
            border-color: var(--pink);
            color: var(--pink);
            background: #fff0f5;
        }

        .prod-desc { color: var(--muted); line-height: 1.8; font-size: 0.9rem; }

        /* BUTTON */
        .prod-btn {
            display: flex; align-items: center; justify-content: center;
            padding: 16px 32px;
            background: linear-gradient(135deg, var(--pink), var(--pink-dark));
            color: #fff; font-weight: 700; font-size: 1rem;
            border-radius: 999px; text-decoration: none;
            box-shadow: 0 6px 20px rgba(233,30,99,0.35);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .prod-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(233,30,99,0.45); }

        /* REVIEWS */
        .reviews-section { margin-top: 48px; }
        .reviews-section h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }
        .reviews-header { margin-bottom: 20px; }
        .reviews-avg { display: flex; align-items: center; gap: 16px; }
        .avg-score { font-size: 3rem; font-weight: 800; color: var(--text); line-height: 1; }
        .reviews-count { font-size: 0.85rem; color: var(--muted); margin-top: 4px; display: block; }
        .reviews-list { display: flex; flex-direction: column; gap: 16px; }
        .review-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .review-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .reviewer-avatar {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--pink), var(--pink-dark));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 1rem;
            flex-shrink: 0;
        }
        .reviewer-info { flex: 1; }
        .reviewer-name { font-weight: 600; font-size: 0.9rem; display: block; }
        .reviewer-date { font-size: 0.8rem; color: var(--muted); }
        .review-stars { display: flex; gap: 2px; margin-left: auto; }
        .review-text { font-size: 0.9rem; color: var(--text); line-height: 1.7; margin-bottom: 12px; }
        .review-likes { font-size: 0.8rem; color: var(--muted); }

        /* NOT FOUND */
        #not-found {
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 60vh; gap: 12px; color: var(--muted);
            text-align: center; padding: 24px;
        }
        #not-found h2 { font-size: 1.4rem; color: var(--text); }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            .product-grid { grid-template-columns: 1fr; gap: 24px; }
            .prod-img-wrap { max-width: 320px; margin: 0 auto; width: 100%; }
            .prod-info { position: static; }
            .prod-name { font-size: 1.2rem; }
            #product-container { padding: 0 16px; margin: 20px auto; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <div class="logo-icon">W</div>
        <span class="logo-text">WaishStyle<span>.</span></span>
    </div>
</nav>

<div id="product-container">
    <div class="product-grid">
        <!-- IMAGE -->
        <div class="prod-img-wrap">
            <img id="prod-img" src="" alt="">
        </div>

        <!-- INFO -->
        <div class="prod-info">
            <h1 id="prod-name"></h1>

            <!-- RATING -->
            <div class="prod-rating-row">
                <div class="stars-row" id="prod-stars"></div>
                <span class="rating-score" id="prod-rating-score"></span>
                <span class="rating-count" id="prod-rating-count"></span>
                <span class="sold-count" id="prod-sold"></span>
            </div>

            <!-- PRICE -->
            <div class="prod-prices">
                <span class="prod-price" id="prod-price"></span>
                <span class="prod-old" id="prod-old-price"></span>
            </div>

            <!-- SIZES -->
            <div id="prod-sizes-wrap">
                <div class="sizes-label">Select Size:</div>
                <div class="sizes-row" id="prod-sizes"></div>
            </div>

            <!-- DESC -->
            <p class="prod-desc" id="prod-desc"></p>

            <!-- BUTTON -->
            <a id="prod-btn" href="#" target="_blank" rel="noopener" class="prod-btn">Shop Now →</a>
        </div>
    </div>

    <!-- REVIEWS -->
    <div class="reviews-section">
        <h2>Customer Reviews</h2>
        <div id="reviews-container"></div>
    </div>
</div>

<div id="not-found">
    <h2>Product not found</h2>
    <p>Check the link and try again.</p>
</div>

<script src="reviews.js"></script>
<script>

/* ================================================
   ENGINE - دست نزن
   ================================================ */
function renderStars(rating) {
    let html = '';
    for (let i = 1; i <= 5; i++) {
        if (i <= Math.floor(rating)) html += '<span class="star full">★</span>';
        else if (i - 0.5 <= rating) html += '<span class="star half">★</span>';
        else html += '<span class="star empty">★</span>';
    }
    return html;
}

function loadProduct() {
    const id = parseInt(window.location.hash.slice(1));
    const p = products[id];
    const container = document.getElementById('product-container');
    const notFound  = document.getElementById('not-found');

    if (!p || !p.name) {
        container.style.display = 'none';
        notFound.style.display  = 'flex';
        return;
    }

    document.title = p.name + ' – WaishStyle';
    document.getElementById('prod-img').src           = p.img;
    document.getElementById('prod-img').alt           = p.name;
    document.getElementById('prod-name').textContent  = p.name;
    document.getElementById('prod-price').textContent = p.price;
    document.getElementById('prod-old-price').textContent = p.oldPrice;
    document.getElementById('prod-desc').textContent  = p.description;
    document.getElementById('prod-btn').href          = p.link;

    // Stars
    document.getElementById('prod-stars').innerHTML       = renderStars(p.rating);
    document.getElementById('prod-rating-score').textContent = p.rating;
    document.getElementById('prod-rating-count').textContent = `(${p.ratingCount} reviews)`;
    document.getElementById('prod-sold').textContent      = `· ${p.sold} sold`;

    // Sizes
    const sizesRow = document.getElementById('prod-sizes');
    const sizesWrap = document.getElementById('prod-sizes-wrap');
    if (p.sizes && p.sizes.length > 0) {
        sizesWrap.style.display = 'block';
        sizesRow.innerHTML = p.sizes.map(s =>
            `<div class="size-tag" onclick="selectSize(this)">${s}</div>`
        ).join('');
    } else {
        sizesWrap.style.display = 'none';
    }

    container.style.display = 'block';
    notFound.style.display  = 'none';

    // Reviews
    if (typeof renderReviews === 'function') renderReviews(id);
}

function selectSize(el) {
    document.querySelectorAll('.size-tag').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
}

window.addEventListener('hashchange', loadProduct);
loadProduct();

</script>
</body>
