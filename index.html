<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaishStyle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #E91E63;
            --pink-dark: #C2185B;
            --bg: #E7E7E7;
            --white: #fff;
            --text: #1E1E1E;
            --muted: #777;
            --radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        nav { display: flex; justify-content: center; padding: 14px 0; }
        .nav-inner {
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 999px;
            height: 44px;
            display: flex; align-items: center; padding: 0 20px; gap: 8px;
        }
        .logo-icon {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--pink), var(--pink-dark));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 800; font-size: 14px;
        }
        .logo-text { font-size: 1rem; font-weight: 700; color: var(--text); }
        .logo-text span { color: var(--pink); }

        #product-container {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: center;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 24px;
        }
        .prod-img-wrap { border-radius: var(--radius); overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .prod-img-wrap img { width: 100%; height: 480px; object-fit: cover; display: block; }
        .prod-info { display: flex; flex-direction: column; gap: 16px; }
        .prod-name { font-size: 1.8rem; font-weight: 700; line-height: 1.3; }
        .prod-prices { display: flex; align-items: center; gap: 12px; }
        .prod-price { font-size: 1.6rem; font-weight: 700; color: var(--pink); }
        .prod-old { font-size: 1rem; color: var(--muted); text-decoration: line-through; }
        .prod-desc { color: var(--muted); line-height: 1.7; font-size: 0.95rem; }
        .prod-btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--pink), var(--pink-dark));
            color: #fff; font-weight: 700; font-size: 1rem;
            border-radius: 999px; text-decoration: none;
            box-shadow: 0 6px 20px rgba(233,30,99,0.35);
            transition: transform 0.2s;
            width: fit-content;
        }
        .prod-btn:hover { transform: translateY(-2px); }

        #not-found {
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 60vh; gap: 12px; color: var(--muted);
        }
        #not-found h2 { font-size: 1.4rem; color: var(--text); }

        @media (max-width: 640px) {
            #product-container { grid-template-columns: 1fr; gap: 24px; }
            .prod-img-wrap img { height: 300px; }
            .prod-name { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <div class="logo-icon">W</div>
        <span class="logo-text">WaishStyle<span>.</span></span>
    </div>
</nav>

<div id="product-container">
    <div class="prod-img-wrap">
        <img id="prod-img" src="" alt="">
    </div>
    <div class="prod-info">
        <h1 id="prod-name"></h1>
        <div class="prod-prices">
            <span class="prod-price" id="prod-price"></span>
            <span class="prod-old" id="prod-old-price"></span>
        </div>
        <p class="prod-desc" id="prod-desc"></p>
        <a id="prod-btn" href="#" target="_blank" class="prod-btn">Shop Now →</a>
    </div>
</div>

<div id="not-found">
    <h2>Product not found</h2>
    <p>Check the link and try again.</p>
</div>

<script>
const products = {
    1: {
        name: "Elegant Midi Dress",
        price: "$62.30",
        oldPrice: "$89.00",
        img: "https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=800&h=1000&fit=crop",
        description: "Stunning midi dress crafted from soft, breathable fabric.",
        link: "https://www.amazon.com/s?k=women+midi+dress"
    },
    2: {
        name: "Classic Black Leather Bag",
        price: "$87.50",
        oldPrice: "$125.00",
        img: "https://images.unsplash.com/photo-1543163521-1bf539c16dd2?w=800&h=1000&fit=crop",
        description: "Genuine leather bag with multiple compartments and gold-tone hardware.",
        link: "https://www.amazon.com/s?k=women+leather+bag"
    },
    3: {
        name: "Wool Trench Coat",
        price: "$132.30",
        oldPrice: "$189.00",
        img: "https://images.unsplash.com/photo-1539533018447-63fcce2678e3?w=800&h=1000&fit=crop",
        description: "Classic double-breasted wool trench coat. A timeless investment piece.",
        link: "https://www.amazon.com/s?k=women+trench+coat"
    },
    4: {
        name: "Rose Gold Women's Watch",
        price: "$168.00",
        oldPrice: "$210.00",
        img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800&h=1000&fit=crop",
        description: "Minimalist rose gold watch with a sleek mesh strap.",
        link: "https://www.amazon.com/s?k=rose+gold+watch+women"
    }
};

function loadProduct() {
    const hash = window.location.hash.slice(1);
    const id = parseInt(hash);
    const p = products[id];
    const container = document.getElementById('product-container');
    const notFound = document.getElementById('not-found');

    if (!p) {
        container.style.display = 'none';
        notFound.style.display = 'flex';
        return;
    }

    document.title = p.name + ' – WaishStyle';
    document.getElementById('prod-img').src = p.img;
    document.getElementById('prod-img').alt = p.name;
    document.getElementById('prod-name').textContent = p.name;
    document.getElementById('prod-price').textContent = p.price;
    document.getElementById('prod-old-price').textContent = p.oldPrice;
    document.getElementById('prod-desc').textContent = p.description;
    document.getElementById('prod-btn').href = p.link;

    container.style.display = 'grid';
    notFound.style.display = 'none';
}

window.addEventListener('hashchange', loadProduct);
loadProduct();
</script>

</body>
</html>
