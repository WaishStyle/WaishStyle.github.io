<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaishStyle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #E91E63;
            --pink-dark: #C2185B;
            --pink-light: #FCE4EC;
            --bg: #E7E7E7;
            --white: #fff;
            --text: #1E1E1E;
            --muted: #777;
            --radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* NAV */
        nav {
            display: flex;
            justify-content: center;
            padding: 12px 0;
        }
        .nav-inner {
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 999px;
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 8px;
        }
        .logo-icon {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--pink), var(--pink-dark));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 800; font-size: 14px;
        }
        .logo-text { font-size: 1rem; font-weight: 700; color: var(--text); }
        .logo-text span { color: var(--pink); }

        /* PRODUCT */
        #product-container {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: center;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .prod-img-wrap {
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .prod-img-wrap img {
            width: 100%; height: 480px;
            object-fit: cover; display: block;
        }
        .prod-info { display: flex; flex-direction: column; gap: 16px; }
        .prod-name { font-size: 1.8rem; font-weight: 700; line-height: 1.3; }
        .prod-prices { display: flex; align-items: center; gap: 12px; }
        .prod-price { font-size: 1.6rem; font-weight: 700; color: var(--pink); }
        .prod-old { font-size: 1rem; color: var(--muted); text-decoration: line-through; }
        .prod-desc { color: var(--muted); line-height: 1.7; font-size: 0.95rem; }
        .prod-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--pink), var(--pink-dark));
            color: #fff; font-weight: 700; font-size: 1rem;
            border-radius: 999px; text-decoration: none;
            box-shadow: 0 6px 20px rgba(233,30,99,0.35);
            transition: transform 0.2s, box-shadow 0.2s;
            width: fit-content;
        }
        .prod-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(233,30,99,0.45); }

        /* NOT FOUND */
        #not-found {
            display: none;
            flex-direction: column; align-items: center; justify-content: center;
            min-height: 60vh; gap: 12px; color: var(--muted);
        }
        #not-found h2 { font-size: 1.4rem; color: var(--text); }

        /* MOBILE */
        @media (max-width: 640px) {
            #product-container { grid-template-columns: 1fr; gap: 24px; }
            .prod-img-wrap img { height: 320px; }
            .prod-name { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <div class="logo-icon">W</div>
        <span class="logo-text">WaishStyle<span>.</span></span>
    </div>
</nav>

<!-- محصول -->
<div id="product-container">
    <div class="prod-img-wrap">
        <img id="prod-img" src="" alt="">
    </div>
    <div class="prod-info">
        <h1 id="prod-name"></h1>
        <div class="prod-prices">
            <span class="prod-price" id="prod-price"></span>
            <span class="prod-old" id="prod-old-price"></span>
        </div>
        <p class="prod-desc" id="prod-desc"></p>
        <a id="prod-btn" href="#" target="_blank" class="prod-btn">
            Shop Now →
        </a>
    </div>
</div>

<!-- اگه لینک اشتباه بود -->
<div id="not-found">
    <h2>Product not found</h2>
    <p>Check the link and try again.</p>
</div>

<script src="product.js"></script>
</body>
</html>
