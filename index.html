<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaishStyle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #E91E63;
            --pink-dark: #C2185B;
            --bg: #E7E7E7;
            --white: #fff;
            --text: #1E1E1E;
            --muted: #777;
            --radius: 20px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* NAV */
        nav { display: flex; justify-content: center; padding: 14px 16px; }
        .nav-inner {
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 999px;
            height: 44px;
            display: flex; align-items: center; padding: 0 20px; gap: 8px;
        }
        .logo-icon {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--pink), var(--pink-dark));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 800; font-size: 14px;
        }
        .logo-text { font-size: 1rem; font-weight: 700; color: var(--text); }
        .logo-text span { color: var(--pink); }

        /* PRODUCT LAYOUT */
        #product-container {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
            max-width: 860px;
            margin: 32px auto;
            padding: 0 24px;
        }

        /* IMAGE - 9:16 ratio */
        .prod-img-wrap {
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            width: 100%;
            aspect-ratio: 9 / 16;
            background: #ddd;
        }
        .prod-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* INFO */
        .prod-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 80px;
        }
        .prod-name { font-size: 1.6rem; font-weight: 700; line-height: 1.3; }
        .prod-prices { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .prod-price { font-size: 1.5rem; font-weight: 700; color: var(--pink); }
        .prod-old { font-size: 1rem; color: var(--muted); text-decoration: line-through; }
        .prod-desc { color: var(--muted); line-height: 1.8; font-size: 0.95rem; }
        .prod-btn {
            display: flex; align-items: center; justify-content: center;
            padding: 16px 32px;
            background: linear-gradient(135deg, var(--pink), var(--pink-dark));
            color: #fff; font-weight: 700; font-size: 1rem;
            border-radius: 999px; text-decoration: none;
            box-shadow: 0 6px 20px rgba(233,30,99,0.35);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .prod-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(233,30,99,0.45); }

        /* NOT FOUND */
        #not-found {
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 60vh; gap: 12px; color: var(--muted);
            text-align: center; padding: 24px;
        }
        #not-found h2 { font-size: 1.4rem; color: var(--text); }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            #product-container {
                grid-template-columns: 1fr;
                gap: 24px;
                margin: 20px auto;
                padding: 0 16px;
            }
            .prod-img-wrap { max-width: 340px; margin: 0 auto; width: 100%; }
            .prod-info { position: static; }
            .prod-name { font-size: 1.3rem; }
            .prod-price { font-size: 1.3rem; }
        }

        @media (min-width: 641px) and (max-width: 900px) {
            #product-container { gap: 24px; padding: 0 16px; }
            .prod-name { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <div class="logo-icon">W</div>
        <span class="logo-text">WaishStyle<span>.</span></span>
    </div>
</nav>

<div id="product-container">
    <div class="prod-img-wrap">
        <img id="prod-img" src="" alt="">
    </div>
    <div class="prod-info">
        <h1 id="prod-name"></h1>
        <div class="prod-prices">
            <span class="prod-price" id="prod-price"></span>
            <span class="prod-old" id="prod-old-price"></span>
        </div>
        <p class="prod-desc" id="prod-desc"></p>
        <a id="prod-btn" href="#" target="_blank" rel="noopener" class="prod-btn">Shop Now →</a>
    </div>
</div>

<div id="not-found">
    <h2>Product not found</h2>
    <p>Check the link and try again.</p>
</div>

<script>

/* ================================================

   لینک محصول:
   waishstyle.github.io/#1
   waishstyle.github.io/#2
   ...

        img: "",        // لینک عکس
        description: "",
        link: ""        // لینک افیلیت
    },

    /* ---------- Product #2 ---------- */
    2: {
        name: "",
        price: "",

        img: "",
        description: "",
        link: ""
    },

    /* ---------- Product #3 ---------- */
    3: {
        name: "",
        price: "",
        oldPrice: "",
        img: "",
        description: "",
        link: ""
    },

    /* ---------- Product #4 ---------- */
    4: {
        name: "",
        price: "",
        oldPrice: "",
        img: "",
        description: "",
        link: ""
    },

    /* ---------- Product #5 ---------- */
    5: {

        img: "",

    },

    /* ---------- Product #7 ---------- */

    /* ---------- محصول جدید اضافه کن ----------
    8: {
        name: "",
        price: "",
        oldPrice: "",
        img: "",
        description: "",
        link: ""
    },
    */

};

/* ================================================
   ENGINE - دست نزن
   ================================================ */
function loadProduct() {
    const id = parseInt(window.location.hash.slice(1));
    const p = products[id];
    const container = document.getElementById('product-container');
    const notFound  = document.getElementById('not-found');

    if (!p || !p.name) {
        container.style.display = 'none';
        notFound.style.display  = 'flex';
        return;
    }

    document.title = p.name + ' – WaishStyle';
    document.getElementById('prod-img').src           = p.img;
    document.getElementById('prod-img').alt           = p.name;
    document.getElementById('prod-name').textContent  = p.name;
    document.getElementById('prod-price').textContent = p.price;
    document.getElementById('prod-old-price').textContent = p.oldPrice;
    document.getElementById('prod-desc').textContent  = p.description;
    document.getElementById('prod-btn').href          = p.link;

    container.style.display = 'grid';
    notFound.style.display  = 'none';
}

window.addEventListener('hashchange', loadProduct);
loadProduct();

</script>
</body>
</html>
